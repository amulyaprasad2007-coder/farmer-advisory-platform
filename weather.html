<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Advisory Platform</title>
    <style>
        /* Merged CSS */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f1;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .advisory-box {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-left: 5px solid #2e7d32;
            text-align: left;
            font-weight: 500;
        }

        .weather-info {
            font-size: 1.5rem;
            margin: 10px 0;
            color: #333;
        }

        .hidden { display: none; }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #1b5e20;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌾 Farmer Weather Advisor</h1>
        <div id="status">Detecting your location...</div>
        
        <div id="weather-card" class="hidden">
            <h2 id="location">---</h2>
            <div class="weather-info">
                <span id="temp">0</span>°C | <span id="description">Clear</span>
            </div>
            <div class="advisory-box">
                <h3>🚜 Agricultural Advice:</h3>
                <p id="advice">Loading advice...</p>
            </div>
        </div>
        
        <button onclick="getLocation()">Refresh Weather</button>
    </div>

    <script>
        // Merged JavaScript
        const API_KEY = '5f0e1483f27aa6b833e7ba044413e47c';

        function getLocation() {
            // Show status while fetching
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('status').innerText = "Detecting your location...";
            document.getElementById('weather-card').classList.add('hidden');

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(fetchWeather, showError);
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        async function fetchWeather(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`);
                const data = await response.json();
                displayWeather(data);
            } catch (error) {
                console.error("Error fetching weather:", error);
                document.getElementById('status').innerText = "Error loading weather data.";
            }
        }

        function displayWeather(data) {
            document.getElementById('status').classList.add('hidden');
            document.getElementById('weather-card').classList.remove('hidden');
            
            const temp = data.main.temp;
            const weatherType = data.weather[0].main.toLowerCase();

            document.getElementById('location').innerText = data.name;
            document.getElementById('temp').innerText = Math.round(temp);
            document.getElementById('description').innerText = data.weather[0].description;

            generateAdvice(temp, weatherType);
        }

        function generateAdvice(temp, type) {
            let advice = "";

            if (type.includes("rain")) {
                advice = "🌧️ Heavy rain expected. Avoid fertilizer application as it may wash away. Ensure proper drainage in fields.";
            } else if (temp > 35) {
                advice = "☀️ High temperature alert! Increase irrigation frequency and avoid midday transplanting to prevent wilting.";
            } else if (type.includes("clear") || type.includes("cloud")) {
                advice = "🌤️ Good weather for harvesting and spraying pesticides. Soil moisture looks stable.";
            } else {
                advice = "🚜 Routine maintenance day. Check for pests and monitor soil health.";
            }

            document.getElementById('advice').innerText = advice;
        }

        function showError(error) {
            document.getElementById('status').innerText = "Unable to retrieve location. Please enable location permissions.";
        }

        // Auto-run on load
        window.onload = getLocation;
    </script>
</body>
</html>
